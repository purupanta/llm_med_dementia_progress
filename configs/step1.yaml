# Notes:
#   Configuration is intentionally split by numbered analytic step so the
#   GitHub project can be reviewed, tested, and maintained one stage at a time.
#   Shared paths/runtime settings remain in _base*.yaml files.

# Step 1 writes s1* files and constructs the MCI next-visit analytic cohort.
# Neuropathology columns are listed here so Step 1 can retain them for Step 6 anchoring;
# they are excluded from predictive model features downstream to prevent leakage.

id_col: NACCID
visit_number_col: NACCVNUM
visit_year_col: VISITYR
visit_month_col: VISITMO
visit_day_col: VISITDAY
last_visit_col: Last visit
current_diagnosis_col: NACCUDSD
mci_code: 3
dementia_code: 4
selected_base_columns:
- SEX
- HISPANIC
- RACE
- NACCAGE
- NACCDAYS
- EDUC
- NACCAPOE
- NACCMMSE
- NACCMOCA
- CDRSUM
- CDRGLOB
- NACCGDS
- DEL
- HALL
- AGIT
- DEPD
- ANX
- ELAT
- APA
- DISN
