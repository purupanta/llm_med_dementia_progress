neuropathology_columns:
- NPFORMVER
- NPADNC
- NACCBRAA
- NACCNEUR
- NACCLEWY
- NPLBOD
- NPINF
- NPPMIH
- NPTAN
- NPLAC
- NPTHAL
- NPART
- NPOANG
- NPFTDTAU
step1:
  official_nacc_dictionary_dir: resources/nacc_official
  require_official_column_descriptions: false
  official_nacc_dictionary_autodownload:
    enabled: true
    overwrite_existing: false
    fail_on_error: false
    timeout_seconds: 30
    files:
    - name: uds_rdd_csv
      filename: uds_rdd.csv
      url: https://files.alz.washington.edu/documentation/uds4-rdd.csv
      required: true
    - name: np_rdd_csv
      filename: np_rdd.csv
      url: https://files.alz.washington.edu/documentation/rdd-np.csv
      required: true
    - name: genetics_rdd_csv
      filename: genetics_rdd.csv
      url: https://files.alz.washington.edu/documentation/rdd-gen.csv
      required: false
  required_columns_for_row_filter:
  - NACCID
  - NACCVNUM
  - VISITYR
  - NACCUDSD
